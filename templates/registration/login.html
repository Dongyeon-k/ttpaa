{% extends "base.html" %}
{% block title %}로그인 | TTPAA 운영 포털{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-5">
    <div class="card shadow-soft border-0">
      <div class="card-body p-4 p-lg-5">
        <div class="mb-4">
          <h1 class="h3 fw-bold mb-2">로그인</h1>
          <p class="text-secondary mb-0">TTPAA 내부 운영 포털에 접속합니다.</p>
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label" for="id_username">아이디</label>
            <input class="form-control form-control-lg" type="text" name="username" id="id_username" required autofocus>
          </div>
          <div class="mb-4">
            <label class="form-label" for="id_password">비밀번호</label>
            <input class="form-control form-control-lg" type="password" name="password" id="id_password" required>
          </div>
          {% if form.errors %}
            <div class="alert alert-danger">아이디 또는 비밀번호를 확인해 주세요.</div>
          {% endif %}
          <button class="btn btn-primary w-100 btn-lg">로그인</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
